<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Library Student Fee Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-book-reader"></i>
                    <span>Library</span>
                </div>
                <button class="close-sidebar" id="closeSidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-tab="dashboard">
                    <i class="fas fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#add-student" class="nav-item" data-tab="add-student">
                    <i class="fas fa-user-plus"></i>
                    <span>Add Student</span>
                </a>
                <a href="#students-list" class="nav-item" data-tab="students-list">
                    <i class="fas fa-users"></i>
                    <span>All Students</span>
                </a>
                <a href="#pending-fees" class="nav-item" data-tab="pending-fees">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Pending Fees</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="hamburger" id="hamburger">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>📚 Library Fee Manager</h1>
            </header>

            <div class="content-wrapper">
                <!-- Dashboard Tab -->
                <section id="dashboard" class="tab-content active">
                    <h2>Dashboard</h2>
                    <div class="stats-container">
                        <div class="stat-card stat-card-1">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-content">
                                <p class="stat-label">Total Students</p>
                                <p class="stat-value" id="total-students">0</p>
                            </div>
                        </div>
                        <div class="stat-card stat-card-2">
                            <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                            <div class="stat-content">
                                <p class="stat-label">Pending Fees</p>
                                <p class="stat-value" id="pending-count">0</p>
                            </div>
                        </div>
                        <div class="stat-card stat-card-3">
                            <div class="stat-icon"><i class="fas fa-rupiah"></i></div>
                            <div class="stat-content">
                                <p class="stat-label">Total Due</p>
                                <p class="stat-value" id="total-amount">₹0</p>
                            </div>
                        </div>
                        <div class="stat-card stat-card-4">
                            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                            <div class="stat-content">
                                <p class="stat-label">Fees Paid</p>
                                <p class="stat-value" id="paid-count">0</p>
                            </div>
                        </div>
                    </div>

                    <div class="pending-section">
                        <h3><i class="fas fa-bell"></i> Students with Pending Fees</h3>
                        <div id="pending-list"></div>
                    </div>
                </section>

                <!-- Add Student Tab -->
                <section id="add-student" class="tab-content">
                    <h2>Add New Student</h2>
                    <div class="form-section">
                        <form id="student-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Student Name *</label>
                                    <input type="text" id="name" required placeholder="Enter student name">
                                </div>

                                <div class="form-group">
                                    <label>Father's Name *</label>
                                    <input type="text" id="father-name" required placeholder="Enter father's name">
                                </div>

                                <div class="form-group">
                                    <label>Mobile Number *</label>
                                    <input type="tel" id="mobile" required placeholder="10-digit number">
                                </div>

                                <div class="form-group">
                                    <label>WhatsApp Number *</label>
                                    <input type="tel" id="whatsapp" required placeholder="919876543210">
                                </div>

                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="email" placeholder="your@email.com">
                                </div>

                                <div class="form-group">
                                    <label>Monthly Fee *</label>
                                    <input type="number" id="fee-amount" required placeholder="Amount" min="0">
                                </div>

                                <div class="form-group full-width">
                                    <label>Address</label>
                                    <textarea id="address" placeholder="Enter address" rows="3"></textarea>
                                </div>

                                <div class="form-group">
                                    <label>Joining Date *</label>
                                    <input type="date" id="joining-date" required>
                                </div>

                                <div class="form-group full-width">
                                    <label>Student Photo *</label>
                                    <input type="file" id="photo" accept="image/*" required>
                                    <div id="photo-preview" class="photo-preview"></div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-plus"></i> Add Student
                            </button>
                        </form>
                    </div>
                </section>

                <!-- Students List Tab -->
                <section id="students-list" class="tab-content">
                    <h2>All Students</h2>
                    <div class="search-bar-wrapper">
                        <input type="text" id="search-input" placeholder="Search by name...">
                    </div>
                    <div id="students-container" class="students-grid"></div>
                </section>

                <!-- Pending Fees Tab -->
                <section id="pending-fees" class="tab-content">
                    <h2>Pending Fees</h2>
                    <div id="pending-fees-container" class="students-grid"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Fee Modal (Monthly Tracker) -->
    <div id="fee-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <div id="fee-modal-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="js/db.js"></script>
    <script src="js/whatsapp.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
<!-- Dashboard Tab के अंदर add करो -->
<div style="display: flex; gap: 12px; margin-top: 20px; margin-bottom: 30px;">
    <button class="btn btn-info" onclick="backup.exportToCSV()">
        <i class="fas fa-download"></i> Export to Excel
    </button>
    <button class="btn btn-info" onclick="backup.exportToJSON()">
        <i class="fas fa-cloud-download-alt"></i> Backup Data
    </button>
    <button class="btn btn-info" onclick="document.getElementById('import-file').click()">
        <i class="fas fa-cloud-upload-alt"></i> Restore Backup
    </button>
</div>

<!-- Hidden file input -->
<input type="file" id="import-file" accept=".json" style="display: none;" onchange="handleFileImport(event)">

<!-- Script -->
<script>
function handleFileImport(event) {
    const file = event.target.files[0];
    if (file) {
        backup.importFromJSON(file);
    }
}
</script>
<div style="background: #e8f4f8; padding: 20px; border-radius: 12px; margin-top: 30px;">
    <h3 style="margin-top: 0;">📦 Backup & Export</h3>
    <p style="color: #666; margin-bottom: 16px;">
        Regularly backup your data to avoid data loss
    </p>
    
    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <button class="btn btn-info" onclick="backup.exportToCSV()">
            <i class="fas fa-file-csv"></i> Export to Excel
        </button>
        <button class="btn btn-info" onclick="backup.exportToJSON()">
            <i class="fas fa-database"></i> Create Backup
        </button>
        <button class="btn btn-info" onclick="document.getElementById('import-file').click()">
            <i class="fas fa-upload"></i> Restore Backup
        </button>
    </div>
    
    <input type="file" id="import-file" accept=".json" style="display: none;" onchange="handleFileImport(event)">
</div>

<script>
function handleFileImport(event) {
    const file = event.target.files[0];
    if (file) {
        backup.importFromJSON(file);
        event.target.value = ''; // Reset input
    }
}
</script>
